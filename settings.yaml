# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  genesis-agent — settings.yaml (non-secret config)                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# A fresh copy runs with EVERYTHING here left as-is — open this file only when
# you want to tune something. Secrets (provider, model, API key) go in .env.
# Each key below says: what it does · its default · good values for your setup.
# Loaded into deps.settings; tools read it via ctx.deps.settings["..."].

# ── Identity ──────────────────────────────────────────────────────────────────
# Who this agent is and where it keeps state.

# Display name. Default: the folder name.
name: genesis-agent

# State-store file inside workspace/ for cross-run memory (get/set/append/all).
# Default: state.json. Use *.json (human-readable, diffable) or *.db (SQLite,
# better for large/concurrent state).
store: state.json

# Sandbox + state directory, relative to this folder. Default: workspace.
# Rarely changed — handy to point several agents at one shared area, or onto a
# mounted volume.
# workspace: workspace

# ── Memory & context ───────────────────────────────────────────────────────────
# How much conversation and tool output the model carries. The defaults suit
# large cloud contexts; shrink them for small local models (see "Running on
# local models" in the README).

# REPL turns kept between prompts (older messages dropped). Default: 40.
#   cloud models            : 40
#   small local contexts    : 10-15
# One-shot runs and the HTTP server are stateless regardless; /clear forgets it.
history_keep: 40

# Your model's usable context window, in tokens — auto-compaction triggers at
# ~60% of this (older history is summarized, not truncated, so early facts
# survive). Default: 100000.
#   GPT-4o / Claude / most cloud   : 100000
#   qwen2.5 via Ollama (32k)       : 24000
#   llama3.1:8b at default num_ctx : 6000
context_budget: 100000

# Auto-compaction behaviour. enabled: true by default (set false to fall back to
# plain history_keep truncation). keep = recent messages left verbatim;
# max_tokens caps the summary itself.
#   chatty/long sessions    : keep 12 (default)
#   tight local context     : keep 6, max_tokens 512
compaction:
  enabled: true
  keep: 12
  # max_tokens: 1024

# Cap on a SINGLE tool's output, in characters (run_shell, fetch_url, HTML
# cleaner). Default: 20000 (~5k tokens). One big result can swamp a small local
# context, so lower it there.
#   cloud (GPT/Claude)             : 20000
#   local 32k ctx (qwen2.5)        : 8000
#   local 8k ctx (llama3.1:8b)     : 3000
max_tool_output: 20000

# ── Guardrails ─────────────────────────────────────────────────────────────────
# Keep a run bounded and reliable.

# Per-run ceilings (pydantic_ai.usage.UsageLimits). request_limit caps model
# requests per task — the cheapest insurance against a runaway tool loop. A hit
# ends the run with a clean message, not a stack trace. Default: request_limit 25.
#   simple Q&A verticals    : 10
#   default                 : 25
#   long research tasks     : 50+
# Add total_tokens_limit to cap spend per run.
limits:
  request_limit: 25
  # total_tokens_limit: 200000

# Retries on a failed tool/model call (Pydantic AI). Default: 2.
#   cloud APIs              : 2
#   flaky local setups      : 3-4
#   debugging tool errors   : 0  (see the real failure immediately)
retries: 2

# ── Model ────────────────────────────────────────────────────────────────────
# Knobs passed straight to the model (pydantic_ai ModelSettings) — anything it
# accepts works, so new keys need no template change. Unset = provider defaults.
#   tool-driven / deterministic verticals : temperature 0
#   creative writing verticals            : temperature 0.7+
# max_tokens caps the model's reply length; timeout is per request (seconds).
# model_settings:
#   temperature: 0
#   max_tokens: 2048
#   timeout: 60

# ── Sandbox & tools ─────────────────────────────────────────────────────────────
# Control what the agent can touch.

# Confine read_file/write_file/list_dir to workspace/ (../ escapes and absolute
# paths outside are refused). Default: true. Set false ONLY for trusted setups.
# Does NOT constrain run_shell — gate that with `tools:` below.
# sandbox: true

# Tool policy. disable: tools never registered (the model can't see them).
# confirm: tools that need a human y/N before each call (in the CLI; headless
# --serve has no human, so a confirm-listed tool refuses to run).
# Why it matters: fetch_url content is attacker-controlled (prompt injection),
# so an unconfirmed run_shell is an injection-to-RCE chain.
#   untrusted inputs / web content : confirm or disable run_shell
#   fully trusted local use        : leave unset
# tools:
#   disable: []
#   confirm: [run_shell]

# ── Server (--serve) ───────────────────────────────────────────────────────────
# Per-task wall-clock ceiling, seconds — a longer task is cancelled with 504.
# Default: 300. Guards against a hung model call holding a worker thread.
#   interactive/short tasks : 120
#   default                 : 300
#   long research endpoints : 600+
# serve_timeout: 300

# ── Prompt caching (optional) ─────────────────────────────────────────────────────
# Reuse the provider's prompt cache for the static prefix to cut cost/latency on
# repeated runs. Anthropic: caches the (static) tool definitions — the footer
# shows "N cached" when a run reads from cache. OpenAI caches automatically;
# other providers: no-op. Instructions aren't cached (the dynamic datetime prompt
# would prevent hits). Cache TTL is a few minutes, so it helps bursts/loops.
# OFF by default.
# prompt_caching: true

# ── Multimodal input (optional) ──────────────────────────────────────────────────
# Attach images/PDFs to a run: one-shot `--image PATH_OR_URL`, drag a file into
# the REPL, or POST `{"task": ..., "images": ["https://..."]}` (server = URLs
# only). Needs a vision-capable model; non-vision models degrade with a clear
# message. max_mb caps a single attachment's size (default 10).
# attachments:
#   max_mb: 10

# ── Planning (optional) ─────────────────────────────────────────────────────────
# Gives the agent `update_plan` — a short todo checklist it keeps up to date on
# multi-step tasks. The current plan is shown to the model each turn and rendered
# in the console. It's a scratchpad, not enforced control flow. OFF by default,
# but cheap — recommended ON for agentic, multi-step verticals; little point for
# simple one-shot Q&A.
# planning:
#   enabled: true

# ── Subagents / delegation (optional) ────────────────────────────────────────────
# Gives the agent `delegate(task)` — run a fresh sub-agent on an isolated subtask
# (clean context) and get back just its answer. Good for focused lookups or
# splitting a big job. Sub-agents share state (store/workspace) but not history,
# never get `write_tool`, and their token cost folds into the parent's budget.
# max_depth caps nesting (1 = the top agent may delegate, sub-agents may not —
# prevents runaway fork bombs). OFF by default.
# subagents:
#   enabled: true
#   max_depth: 1

# ── Self-improvement (optional) ─────────────────────────────────────────────────
# Lets the agent extend itself, all sandboxed to workspace/. OFF by default — a
# fresh copy can't author or run self-written code. When enabled it gains:
# write_skill/read_skill (markdown procedures, no approval), remember (lessons
# recalled next session), and write_tool/read_tool (Python tools that run ONLY
# after validation AND a human approval; "always allow" grants persist in
# workspace/approvals.json and re-prompt when the code changes).
# self_improvement:
#   enabled: true
# Recent lessons injected into the system prompt. Default: 5. (0 disables recall.)
# memory_recall: 5
# Generated-tool execution limits. timeout = wall-clock seconds a generated tool
# may run (default 10). banned_imports = modules rejected at validation.
# generated_tools:
#   timeout: 10
#   banned_imports: [subprocess, socket, ctypes, multiprocessing]
# Approvals. headless_allow_granted: on --serve (no human), honor previously
# persisted "always allow" grants instead of denying. Default: false (deny).
# approvals:
#   headless_allow_granted: false

# ── MCP servers (optional) ──────────────────────────────────────────────────────
# Opt-in external tool servers. Install with `uv sync --extra mcp`, then declare
# them here; their tools appear like built-ins (prefixed with `name`). stdio
# servers are spawned locally; remote servers use `url`. See examples/mcp_demo/.
# Unset = no MCP, nothing changes.
# mcp:
#   - name: demo
#     command: python
#     args: ["examples/mcp_demo/echo_server.py"]
#   - name: docs
#     url: https://example.com/mcp
#     headers:
#       Authorization: "Bearer ..."

# ── Your vertical's settings ────────────────────────────────────────────────────
# Add any keys your tools need; read them via ctx.deps.settings["..."]. Examples:
# symbols: [AAPL, MSFT, NVDA]
# thresholds:
#   max_position: 1000
# feeds:
#   - https://hnrss.org/frontpage
