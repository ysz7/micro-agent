# ── genesis-agent vertical config (non-secret) ─────────────────────────────────
# Loaded into deps.settings and available to every tool via ctx.deps.settings.
# Secrets go in .env, not here.

# Display name for this agent (defaults to the folder name).
name: genesis-agent

# State store filename inside workspace/. Use *.json (readable) or *.db (SQLite).
store: state.json

# How many times Pydantic AI retries a failed tool/model call.
retries: 2

# Local run log: append one JSON line per run (task, duration, tokens, ok/err)
# to workspace/runs.jsonl. Greppable history, zero external services.
# log_runs: true

# REPL conversation memory: how many recent messages to carry between turns
# (older ones are dropped to keep context bounded). /clear forgets the session.
# One-shot runs and the HTTP server are stateless regardless.
history_keep: 40

# ── History auto-compaction ──────────────────────────────────────────────────
# When the conversation outgrows ~60% of context_budget, everything except the
# last `keep` messages is replaced by a model-written summary, so facts from
# the start of a long session survive instead of being truncated away.
# context_budget is your model's usable context window, in tokens. Presets:
#   GPT-4o / Claude / most cloud models : 100000
#   qwen2.5 via Ollama (32k context)    : 24000
#   llama3.1:8b at default num_ctx (8k) : 6000
context_budget: 100000
compaction:
  enabled: true
  keep: 12          # recent messages kept verbatim
  # max_tokens: 1024  # cap on the summary itself

# ── Run guardrails ───────────────────────────────────────────────────────────
# Per-run ceilings (pydantic_ai.usage.UsageLimits). request_limit caps how many
# model requests a single task may make — the cheapest insurance against a
# runaway tool loop burning tokens. Add total_tokens_limit to cap spend per run.
# Hitting a limit ends the run with a clean message, not a stack trace.
limits:
  request_limit: 25
  # total_tokens_limit: 200000

# ── Model knobs ──────────────────────────────────────────────────────────────
# Anything pydantic_ai's ModelSettings accepts, passed through as-is.
# model_settings:
#   temperature: 0
#   max_tokens: 2048
#   timeout: 60

# ── Filesystem sandbox ───────────────────────────────────────────────────────
# read_file/write_file/list_dir refuse paths outside workspace/ (relative ../
# escapes and absolute paths alike). Set to false ONLY for trusted setups.
# NOTE: this does not constrain run_shell — gate that via `tools:` below.
# sandbox: true

# ── Tool policy ──────────────────────────────────────────────────────────────
# disable: tools never registered (the model can't see or call them).
# confirm: tools that require a human y/N before each call. In the CLI you get a
#   prompt; headless (--serve) has no human, so a confirm-listed tool refuses to
#   run and returns a notice instead. Rationale: fetch_url content is
#   attacker-controlled (prompt injection), so an unconfirmed run_shell is an
#   injection-to-RCE chain — confirm or disable run_shell for untrusted inputs.
# tools:
#   disable: []
#   confirm: [run_shell]

# ── HTTP server (--serve) ────────────────────────────────────────────────────
# Per-task wall-clock ceiling, seconds. A task (POST /task or GET /task/stream)
# that runs longer is cancelled and answered with 504. Guards against a hung
# model call holding a worker thread forever.
# serve_timeout: 300

# ── External MCP tool servers (optional) ─────────────────────────────────────
# Opt-in: install with `uv sync --extra mcp`, then declare servers here. Their
# tools appear to the agent like built-ins (prefixed with `name`). stdio servers
# are spawned locally; remote servers use `url`. See examples/mcp_demo/.
# mcp:
#   - name: demo
#     command: python
#     args: ["examples/mcp_demo/echo_server.py"]
#   - name: docs
#     url: https://example.com/mcp
#     headers:
#       Authorization: "Bearer ..."

# ── Vertical settings — add your own below ───────────────────────────────────
# Tools read these via ctx.deps.settings["..."]. Examples:
# symbols: [AAPL, MSFT, NVDA]
# thresholds:
#   max_position: 1000
# feeds:
#   - https://hnrss.org/frontpage
